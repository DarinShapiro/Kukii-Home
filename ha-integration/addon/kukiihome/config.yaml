# Kukii-Home — Home Assistant Supervisor add-on manifest.
# https://developers.home-assistant.io/docs/add-ons/configuration

name: Kukii-Home
version: '0.26.6'
slug: kukiihome
description: AI-powered home security and presence understanding
url: https://github.com/DarinShapiro/Kukii-Home
arch:
  # amd64 dropped 2026-06-04 — single known user runs HA Yellow (aarch64). To
  # re-enable: add `- amd64` back here AND re-add the matrix entry in
  # .github/workflows/addon-build.yml. The verify-published gate picks up
  # the arch set dynamically from this list.
  - aarch64
init: false
# We rely on s6-overlay (provided by the base image) to supervise multiple
# long-running Kukii-Home services in one container.

# Standard container networking + an explicit NAT for the Web UI port.
# host_network: true was tried in 0.1.4 and below; it caused "connection
# refused" on some HA OS setups because the container's bind didn't end
# up reachable on the host port. Will switch back once RTSP / NATS paths
# need it AND we've verified it works on HA Yellow.

# Allow the add-on to call Supervisor APIs (HA Core proxy at
# http://supervisor/core, secrets, etc.). The ha-agent uses this to talk
# to HA Core via SUPERVISOR_TOKEN.
hassio_api: true
homeassistant_api: true

# Persistent storage for the embedded Postgres + Qdrant + Redis volumes
# and Kukii-Home's object store (frames, clips).
map:
  - addon_config:rw
  - share:rw
  # Epic 10.8.4: config:rw lets the add-on auto-install + auto-update
  # its companion custom integration at /config/custom_components/kukiihome/.
  # The cont-init script syncs the bundled integration files on every
  # boot so the add-on version and integration version can't drift —
  # eliminating the "did you update both?" failure mode from
  # v0.3.15/17/20/23.
  - config:rw

# Ingress mode: HA proxies the Web UI through its own auth + URL space.
# No port published to the host network — eliminates the entire class of
# bugs around `host_network`, port conflicts, firewall rules between
# browser and HA host. The "OPEN WEB UI" button stays in Supervisor; it
# now opens a URL like /api/hassio_ingress/<token>/ rather than
# http://<host>:<port>/.
ingress: true
ingress_port: 8765
ingress_stream: false
panel_icon: mdi:cctv
panel_title: Kukii-Home

# Optional external port for direct API access (the custom integration's
# coordinator can use this; ingress is for the UI). Comment out to keep
# the API ingress-only.
ports:
  '8765/tcp': 8765
ports_description:
  '8765/tcp': Kukii-Home ha-agent API (direct access; UI uses ingress)

startup: services
boot: auto

# Options surface in the Supervisor add-on UI. Each top-level key here
# also needs a `schema:` entry below — Supervisor only renders form
# fields for declared options.
#
# `adapters` is the main field most users will edit. It's a structured
# array so Supervisor renders an "Add Adapter" button + per-field inputs.
# For deep / complex configs, use Supervisor's YAML editor mode (toggle
# via the three-dot menu in the Configuration tab).
options:
  profile: yellow_single_box
  household_id: my_home
  timezone: UTC
  ha_token: ''
  log_level: INFO
  # Zero-config camera onboarding (v0.3.11+). When ON (default), the
  # add-on auto-discovers every HA camera, AI-picks the best stream +
  # motion sensors, and wires them up live — no need to write any
  # `adapters:` entries below. Per-device toggles + overrides are in
  # the Web UI's "HA cameras detected" card.
  auto_discover: true
  adapters: []
  # Epic 10.9: URL of the Kukii-Home preprocessor (inference box) on
  # your LAN, e.g. http://192.168.68.50:8090. When set, alerts are
  # enriched with the preprocessor's recognition (who/what was seen +
  # an annotated frame). Leave blank if you don't run a separate
  # preprocessor — alerts still fire with the HA snapshot + rule.
  preprocessor_url: ''

  # Iter 3 / Part X §35: text LLM endpoint for the conversational
  # dispatcher. When set, /memory's drawer routes natural-language
  # utterances through the LLM to place them on the right guidance
  # storage class (Rule / Preference / TransientIntent / Dismissal /
  # SituationalContext / area_posture) with a one-sentence reasoning
  # field for the audit trail. When EITHER url or api_key is blank,
  # the drawer falls back to a heuristic pattern matcher — still
  # functional, just less nuanced. The /memory page renders a
  # degraded-mode banner when the LLM is configured but unreachable.
  #
  # Any OpenAI-compatible chat-completions endpoint works:
  #   Cerebras   : https://api.cerebras.ai/v1   (recommended; fast)
  #   Ollama     : http://YOUR_HOST:11434/v1    (local)
  #   LM Studio  : http://YOUR_HOST:1234/v1     (local)
  #   OpenAI     : https://api.openai.com/v1
  #   Together   : https://api.together.xyz/v1
  #   Groq       : https://api.groq.com/openai/v1
  # The base URL needs the /v1 suffix; the add-on tolerates it
  # either way.
  llm_url: ''
  llm_api_key: ''
  # Model availability is per-account on Cerebras — check
  # `GET https://api.cerebras.ai/v1/models` with your key to see what
  # your account can use. The default below is verified working on a
  # standard developer account. Common alternatives if your account
  # has access: llama-3.3-70b, llama-4-scout-17b-16e-instruct,
  # qwen-3-32b. For non-Cerebras providers, use whatever model id
  # they document (Ollama: 'llama3.3:70b', OpenAI: 'gpt-4o', etc.).
  llm_model: 'gpt-oss-120b'
schema:
  profile: list(yellow_single_box|yellow_plus_inference|distributed)
  household_id: str
  timezone: str
  ha_token: password?
  log_level: list(DEBUG|INFO|WARNING|ERROR)?
  auto_discover: bool?
  preprocessor_url: str?
  # LLM endpoint for the conversational dispatcher (Part X §35).
  # api_key is a password so Supervisor masks it in the UI + logs.
  llm_url: str?
  llm_api_key: password?
  llm_model: str?

  # Structured adapter config — renders as repeatable form items.
  # See DOCS.md for examples. Two adapter kinds are commonly used today:
  #   ha-camera   — ride on HA's camera integration (preferred)
  #   rtsp-direct — pull RTSP directly (for cameras not in HA)
  adapters:
    - name: str
      kind: list(rtsp-direct|ha-camera|agent-dvr|frigate|blueiris|synology|qnap|unifi)
      # ha-camera fields
      camera_entity: str?
      motion_entities:
        - str?
      snapshot_cooldown_seconds: float(1.0,3600.0)?
      # rtsp-direct / generic fields
      url: str?
      username: str?
      password: password?
      mqtt_host: str?

  # Less-common nested sections; advanced users edit via YAML mode.
  bus: 'match(.+)?'
  memory: 'match(.+)?'
  vlm_router: 'match(.+)?'
  notify: 'match(.+)?'

# Pre-built per-arch images, published to GHCR by the addon-build workflow
# on every push to main (#289). Supervisor substitutes `{arch}` (amd64 /
# aarch64) and pulls `:<version>` matching the `version:` field above —
# so a (re)install is a ~30s `docker pull` instead of a ~15min local build.
#
# Phase 2 of the two-phase rollout: the v0.4.0 images are confirmed present
# in GHCR (amd64 + aarch64, tags :0.4.0 + :latest) before enabling this.
# IMPORTANT: every future version bump MUST land its images in GHCR (i.e.
# the addon-build run on main must go green) BEFORE users update, or the
# pull 404s — Supervisor does not fall back to a local build when `image:`
# is set. To force a local build again (e.g. debugging), comment this out.
image: ghcr.io/darinshapiro/{arch}-kukiihome-addon
