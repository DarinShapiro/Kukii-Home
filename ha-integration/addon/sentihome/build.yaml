# Per-arch base images used by Supervisor's add-on builder.
# https://developers.home-assistant.io/docs/add-ons/configuration/#optional-configuration-options
#
# Supervisor reads this file and passes the matching BUILD_FROM as a
# --build-arg to `docker build` based on the target architecture.
# Without it, the Dockerfile's ARG default is used, which only works on
# the arch that matches the default — hence the "exec format error" /
# "InvalidBaseImagePlatform" on aarch64 hosts (HA Yellow, Pi, etc).

build_from:
  amd64: ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.20
  aarch64: ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.20

labels:
  org.opencontainers.image.title: SentiHome
  org.opencontainers.image.description: AI-powered home security and presence understanding
  org.opencontainers.image.source: https://github.com/DarinShapiro/SentiHome
  org.opencontainers.image.licenses: MIT
