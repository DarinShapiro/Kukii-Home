name: Add-on build

on:
  push:
    branches: [main]
    paths:
      - 'ha-integration/addon/**'
      - 'ha-integration/custom_components/**'
      - 'services/**'
      - 'shared/lib-python/**'
      - 'adapters/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/addon-build.yml'
  pull_request:
    paths:
      - 'ha-integration/addon/**'
      - 'ha-integration/custom_components/**'
      - 'services/**'
      - 'shared/lib-python/**'
      - 'adapters/**'
      - '.github/workflows/addon-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Validate add-on config.yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sanity-check YAML
        run: |
          python -c "import yaml, sys; yaml.safe_load(open('ha-integration/addon/kukiihome/config.yaml')); print('config.yaml OK')"
      - name: Compile-check the HA custom integration
        run: |
          # The custom_components integration is NOT in the uv workspace,
          # so the main CI never imports it — a syntax error there ships
          # silently (the SentiHome->Kukii-Home rename did exactly this,
          # corrupting class identifiers into `Kukii-HomeCoordinator`).
          # py_compile every module so an unimportable integration fails
          # the build instead of the user's HA install.
          python -m compileall -q ha-integration/custom_components/kukiihome/
          echo "HA custom integration compiles"
      - name: Check required add-on files exist
        run: |
          for f in config.yaml Dockerfile README.md DOCS.md CHANGELOG.md icon.png logo.png; do
            test -f "ha-integration/addon/kukiihome/$f" || { echo "MISSING: $f"; exit 1; }
          done
          # Epic 10.8.2: the Yellow add-on ships ONLY the ha-agent
          # service. The preprocessor (torch/onnxruntime/openvino) +
          # core/memory/notify/vlm-router run on a separate inference
          # box, not in this image. Check just what's actually here.
          for svc in ha-agent; do
            test -f "ha-integration/addon/kukiihome/rootfs/etc/services.d/$svc/run" || {
              echo "MISSING s6 service: $svc"; exit 1; }
          done
          echo "All required add-on files present"
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ha-integration/addon/kukiihome/Dockerfile
          failure-threshold: warning
          # DL3018: apk version pin (n/a — we use apt, kept from template).
          # DL3006: `FROM ${BUILD_FROM}` can't be tagged — HA add-ons
          #   require a per-arch base supplied via ARG by build.yaml.
          # DL3008: apt version pinning against a rolling :bookworm base
          #   is a maintenance trap; the base image is already pinned.
          ignore: DL3006,DL3008,DL3018

  # Static check of the s6 run scripts — arch-independent, so it runs
  # once here rather than per matrix leg.
  s6-scripts:
    name: Verify s6 run scripts point at the venv
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Verify s6 run scripts point at the venv
        run: |
          # If a service run script uses bare `python` instead of
          # /app/.venv/bin/python, it WILL crash-loop on import. Catch
          # the regression here.
          for f in ha-integration/addon/kukiihome/rootfs/etc/services.d/*/run; do
            if grep -q 'exec python' "$f"; then
              echo "FAIL: $f uses bare 'python'; should use /app/.venv/bin/python"
              exit 1
            fi
            if ! grep -q 'exec /app/.venv/bin/python' "$f"; then
              echo "FAIL: $f doesn't invoke /app/.venv/bin/python"
              exit 1
            fi
          done
          echo "All s6 run scripts correctly target the venv python"

  # Build amd64 + aarch64. On PRs: build + load + sanity-run (verify the
  # image actually boots) — no push. On main / manual dispatch: also push
  # pre-built per-arch images to GHCR so Supervisor can `docker pull`
  # instead of building locally (#289 — cuts ARM64 install from ~15min to
  # ~30s). Per-arch image naming (`{arch}-kukiihome-addon`) matches the HA
  # add-on `image: ghcr.io/<owner>/{arch}-kukiihome-addon` convention.
  build:
    name: Build add-on image (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base-debian:bookworm
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base-debian:bookworm
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (cross-arch emulation for aarch64)
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Compute image ref + tags
        id: img
        run: |
          # GHCR repo names must be lowercase. Tags are ALWAYS fully
          # registry-qualified (ghcr.io/...) so that with --load on a PR
          # they're just local refs, and with --push on main they go to
          # GHCR — never a bare name that buildx would try to resolve
          # against docker.io (that 401'd the first run).
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          version=$(python -c "import yaml; print(yaml.safe_load(open('ha-integration/addon/kukiihome/config.yaml'))['version'])")
          image="ghcr.io/${owner}/${{ matrix.arch }}-kukiihome-addon"
          {
            echo "image=${image}"
            echo "version=${version}"
            echo "tags=${image}:${version},${image}:latest"
            echo "ref=${image}:${version}"
          } >> "$GITHUB_OUTPUT"
          echo "Building ${{ matrix.arch }} -> ${image}:${version}"
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (and push on main) the add-on image
        uses: docker/build-push-action@v6
        with:
          # Supervisor uses the add-on directory as build context + reads
          # build.yaml for BUILD_FROM. We mirror both so CI breakage
          # matches what a real install would hit. KUKIIHOME_REF pins the
          # in-image clone to the commit under test. load:true keeps the
          # built image available for the amd64 sanity-run; push only on
          # main publishes it to GHCR.
          context: ha-integration/addon/kukiihome
          platforms: ${{ matrix.platform }}
          load: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.img.outputs.tags }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            KUKIIHOME_REF=${{ github.sha }}
            CACHEBUST=${{ github.sha }}
      - name: Sanity-run the image (amd64 only)
        if: matrix.arch == 'amd64'
        run: |
          # Verify the s6 run scripts can actually start the ha-agent
          # using the same venv-python path the s6 scripts use — if that
          # path changes and the run scripts don't follow, we'd ship
          # broken images again (which we did in v0.1.3-v0.1.6).
          # Epic 10.8.2: the image installs only kukiihome-ha-agent + the
          # shared lib (the inference stack lives on a separate box), so
          # import exactly what the Dockerfile installs. (aarch64 runs
          # only under QEMU here, too slow to boot — the build succeeding
          # is the gate for it.)
          docker run --rm ${{ steps.img.outputs.ref }} /bin/bash -c '
            /app/.venv/bin/python -c "
            import kukiihome_shared.topology
            import kukiihome_shared.motion
            import kukiihome_ha_agent
            print(\"ha-agent + shared lib importable from /app/.venv/bin/python\")
            "
          '

  # The "safe to update" gate. config.yaml's `image:` makes Supervisor
  # PULL `ghcr.io/.../{arch}-kukiihome-addon:<version>` with NO fallback
  # to a local build — so if that tag isn't actually in GHCR, a user's
  # update 404s. This job re-pulls the manifest for the version config.yaml
  # currently declares, for BOTH arches, AFTER the build/push. It fails red
  # if either is missing. Net effect: a GREEN addon-build run on a commit
  # means "the images config.yaml points at are live — safe to update";
  # RED means "do not update." Removes the silent window between a version
  # bump landing on main and its images existing. Runs only post-push (on a
  # PR nothing is published yet, so there's nothing to verify).
  verify-published:
    name: Verify GHCR images match config.yaml version
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Manifest for config.yaml's version must exist for every arch
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          version=$(python -c "import yaml; print(yaml.safe_load(open('ha-integration/addon/kukiihome/config.yaml'))['version'])")
          # The set of arches config.yaml promises Supervisor can install.
          arches=$(python -c "import yaml; print(' '.join(yaml.safe_load(open('ha-integration/addon/kukiihome/config.yaml'))['arch']))")
          echo "Verifying ${arches} images for version ${version} ..."
          fail=0
          for arch in $arches; do
            ref="ghcr.io/${owner}/${arch}-kukiihome-addon:${version}"
            if docker manifest inspect "$ref" >/dev/null 2>&1; then
              echo "  OK  $ref"
            else
              echo "  MISSING  $ref"
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            echo "::error::config.yaml declares image:/version that is not fully published to GHCR — a user update would 404. Do not update the add-on until this is green."
            exit 1
          fi
          echo "All declared-arch images for ${version} are live in GHCR — safe to update."
