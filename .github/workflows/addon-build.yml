name: Add-on build

# Workflow shape (race-free CD, post-build-first refactor):
#
#   validate ─► s6-scripts ─┬─► release    (push to main only, all-in-one:
#                           │               build + push image + verify GHCR,
#                           │               THEN commit bump + tag + Release)
#                           │
#                           └─► build      (PR only, --load no --push,
#                                           Dockerfile sanity check)
#
# THE INVARIANT: the version on main can only advance AFTER the image at that
# version is already live in GHCR. Eliminates the race where Supervisor reads
# a newly-bumped main, tries to pull the image, and 404s because it hadn't
# been pushed yet. Implemented by sequencing semantic-release's plugins so
# @semantic-release/exec's publishCmd (which calls docker-build-and-push.sh)
# runs BEFORE @semantic-release/git's commit step. If the build or GHCR push
# fails, semantic-release aborts; main stays at the old version.
#
# Conventional Commit prefix decides the bump:
#   feat: → minor   fix:/perf: → patch   feat!: or BREAKING CHANGE → major
#   chore:/docs:/refactor:/test:/style:/build:/ci: → no release
# See RELEASING.md for the full table.
on:
  push:
    branches: [main]
    paths:
      - 'ha-integration/addon/**'
      - 'ha-integration/custom_components/**'
      - 'services/**'
      - 'shared/lib-python/**'
      - 'adapters/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/addon-build.yml'
      - '.github/scripts/bump-version.cjs'
      - '.releaserc.json'
  pull_request:
    paths:
      - 'ha-integration/addon/**'
      - 'ha-integration/custom_components/**'
      - 'services/**'
      - 'shared/lib-python/**'
      - 'adapters/**'
      - '.github/workflows/addon-build.yml'
      - '.github/scripts/bump-version.cjs'
      - '.releaserc.json'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Validate add-on config.yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sanity-check YAML
        run: |
          python -c "import yaml, sys; yaml.safe_load(open('ha-integration/addon/kukiihome/config.yaml')); print('config.yaml OK')"
      - name: Compile-check the HA custom integration
        run: |
          # The custom_components integration is NOT in the uv workspace,
          # so the main CI never imports it — a syntax error there ships
          # silently (the SentiHome->Kukii-Home rename did exactly this,
          # corrupting class identifiers into `Kukii-HomeCoordinator`).
          # py_compile every module so an unimportable integration fails
          # the build instead of the user's HA install.
          python -m compileall -q ha-integration/custom_components/kukiihome/
          echo "HA custom integration compiles"
      - name: Check required add-on files exist
        run: |
          for f in config.yaml Dockerfile README.md DOCS.md CHANGELOG.md icon.png logo.png; do
            test -f "ha-integration/addon/kukiihome/$f" || { echo "MISSING: $f"; exit 1; }
          done
          # Epic 10.8.2: the Yellow add-on ships ONLY the ha-agent
          # service. The preprocessor (torch/onnxruntime/openvino) +
          # core/memory/notify/vlm-router run on a separate inference
          # box, not in this image. Check just what's actually here.
          for svc in ha-agent; do
            test -f "ha-integration/addon/kukiihome/rootfs/etc/services.d/$svc/run" || {
              echo "MISSING s6 service: $svc"; exit 1; }
          done
          echo "All required add-on files present"
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ha-integration/addon/kukiihome/Dockerfile
          failure-threshold: warning
          # DL3006/8/18 — see prior justification in commit history.
          ignore: DL3006,DL3008,DL3018

  # Static check of the s6 run scripts — arch-independent, so it runs
  # once here rather than per matrix leg.
  s6-scripts:
    name: Verify s6 run scripts point at the venv
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Verify s6 run scripts point at the venv
        run: |
          # Bare `python` in an s6 run script → crash-loop on import.
          # Catch the regression here.
          #
          # Non-Python services (e.g. the Neo4j sidecar, which execs
          # `neo4j console`) opt out with a `# s6-non-python-service`
          # marker comment. The opt-out is deliberate + grep-visible, so a
          # Python service can't silently dodge the venv-python rule.
          for f in ha-integration/addon/kukiihome/rootfs/etc/services.d/*/run; do
            if grep -q 's6-non-python-service' "$f"; then
              echo "SKIP: $f (declared non-python service)"
              continue
            fi
            if grep -q 'exec python' "$f"; then
              echo "FAIL: $f uses bare 'python'; should use /app/.venv/bin/python"
              exit 1
            fi
            if ! grep -q 'exec /app/.venv/bin/python' "$f"; then
              echo "FAIL: $f doesn't invoke /app/.venv/bin/python"
              exit 1
            fi
          done
          echo "All s6 run scripts correctly target the venv python"

  # ── release: bump + build + push + verify GHCR + commit (in that order) ──
  #
  # All in one job because the ordering invariant is load-bearing: if anything
  # before the commit step fails, the bump must not land on main. semantic-
  # release's @semantic-release/exec publishCmd runs docker-build-and-push.sh
  # BEFORE @semantic-release/git commits (plugin order = execution order). So:
  #
  #   1. analyze commits → decide version (or skip)
  #   2. write CHANGELOG.md to workspace
  #   3. write new version to config.yaml + manifest.json in workspace
  #   4. docker buildx build + push to GHCR (publishCmd)
  #   5. docker manifest inspect to verify image is live in GHCR (publishCmd)
  #   6. @semantic-release/git commits the bump to main with [skip ci]
  #   7. @semantic-release/github creates the GitHub Release + git tag
  #
  # If 4 or 5 fail, 6 + 7 never run → main stays at the old version → Supervisor
  # never sees an image-less new version. The image at the new tag may end up
  # as an orphan in GHCR if push succeeded but verify failed; harmless.
  release:
    name: Release (bump → build → publish → verify → commit)
    runs-on: ubuntu-latest
    needs: s6-scripts
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write       # @semantic-release/git pushes bump commit + tag
      issues: write         # @semantic-release/github (release comments)
      pull-requests: write  # @semantic-release/github (PR comments)
      packages: write       # docker push to ghcr.io
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_git_head: ${{ steps.semantic.outputs.new_release_git_head }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # semantic-release needs full history + tags
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Set up QEMU (cross-arch emulation for aarch64)
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run semantic-release (build + push BEFORE commit)
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          # Pin semantic-release to v23 — v24's release-notes-generator throws
          # "Method Date.prototype.toString called on incompatible receiver"
          # against conventional-changelog-conventionalcommits@7. We hit it on
          # 5 consecutive commits 2026-06-04 before catching the pattern.
          # Pin pair: semantic-release@23 + conventional-changelog-
          # conventionalcommits@7 is the known-good combo.
          semantic_version: 23
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/git@10
            @semantic-release/exec@6
            conventional-changelog-conventionalcommits@7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

  # PR Dockerfile sanity check (load only, no push). On PR pushes, builds
  # the image locally to verify the Dockerfile + build args still produce a
  # working image. No release pipeline runs on PRs; this is the only way
  # Dockerfile regressions get caught before merge.
  #
  # amd64 dropped 2026-06-04: only known user runs HA Yellow (aarch64).
  # Restorable by re-adding the matrix entry + the arch to config.yaml.
  build:
    name: Build add-on image (aarch64, PR sanity)
    runs-on: ubuntu-latest
    needs: s6-scripts
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (cross-arch emulation for aarch64)
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (load only, no push)
        uses: docker/build-push-action@v6
        with:
          context: ha-integration/addon/kukiihome
          platforms: linux/arm64
          load: true
          push: false
          tags: kukiihome-addon-pr-check:${{ github.sha }}
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/aarch64-base-debian:bookworm
            KUKIIHOME_REF=${{ github.sha }}
            CACHEBUST=${{ github.sha }}
