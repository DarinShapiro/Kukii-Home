name: Add-on build

on:
  push:
    branches: [main]
    paths:
      - 'ha-integration/addon/**'
      - 'services/**'
      - 'shared/lib-python/**'
      - 'adapters/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/addon-build.yml'
  pull_request:
    paths:
      - 'ha-integration/addon/**'
      - 'services/**'
      - 'shared/lib-python/**'
      - 'adapters/**'
      - '.github/workflows/addon-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Validate add-on config.yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sanity-check YAML
        run: |
          python -c "import yaml, sys; yaml.safe_load(open('ha-integration/addon/sentihome/config.yaml')); print('config.yaml OK')"
      - name: Check required add-on files exist
        run: |
          for f in config.yaml Dockerfile README.md DOCS.md CHANGELOG.md icon.png logo.png; do
            test -f "ha-integration/addon/sentihome/$f" || { echo "MISSING: $f"; exit 1; }
          done
          for svc in core memory ha-agent notify vlm-router preprocessor; do
            test -f "ha-integration/addon/sentihome/rootfs/etc/services.d/$svc/run" || {
              echo "MISSING s6 service: $svc"; exit 1; }
          done
          echo "All required add-on files present"
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ha-integration/addon/sentihome/Dockerfile
          failure-threshold: warning
          ignore: DL3018

  build:
    name: Build add-on image (amd64)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build amd64 image (matches Supervisor's local-build path)
        run: |
          # Supervisor uses the add-on directory as build context. We do
          # the same so CI catches breakage that the user would hit.
          # SENTIHOME_REF=${{ github.sha }} pins the in-image clone to the
          # commit under test instead of main, so PR builds verify the
          # actual change.
          docker buildx build \
            --platform linux/amd64 \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.20 \
            --build-arg SENTIHOME_REF=${{ github.sha }} \
            --tag sentihome-addon:ci \
            --load \
            ha-integration/addon/sentihome
      - name: Sanity-run the image
        run: |
          # Verify the s6 run scripts can actually start each SentiHome
          # service. Use the same venv-python path the s6 scripts use —
          # if this changes and the run scripts don't follow, we'd ship
          # broken images again (which we did in v0.1.3-v0.1.6).
          docker run --rm sentihome-addon:ci /bin/bash -c '
            /app/.venv/bin/python -c "
            import sentihome_shared.topology
            import sentihome_core
            import sentihome_memory
            import sentihome_ha_agent
            import sentihome_notify
            import sentihome_vlm_router
            import sentihome_preprocessor
            print(\"All SentiHome packages importable from /app/.venv/bin/python\")
            "
          '
      - name: Verify s6 run scripts point at the venv
        run: |
          # If a service run script uses bare `python` instead of
          # /app/.venv/bin/python, it WILL crash-loop on import. Catch
          # the regression here.
          for f in ha-integration/addon/sentihome/rootfs/etc/services.d/*/run; do
            if grep -q 'exec python' "$f"; then
              echo "FAIL: $f uses bare 'python'; should use /app/.venv/bin/python"
              exit 1
            fi
            if ! grep -q 'exec /app/.venv/bin/python' "$f"; then
              echo "FAIL: $f doesn't invoke /app/.venv/bin/python"
              exit 1
            fi
          done
          echo "All s6 run scripts correctly target the venv python"
