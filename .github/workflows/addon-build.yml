name: Add-on build

# Workflow shape (post-CD-adoption):
#
#   validate ─┬─► s6-scripts ─┬─► release  ─► build ─► verify-published
#             │               │   (push,         (only when release
#             │               │    main only,     published a new
#             │               │    skips on       version)
#             │               │    chore/docs)
#             └───────────────┘
#                 (always run, including PRs — they catch syntax + image
#                  breakage even when no release is in scope)
#
# release/build/verify are all gated on (push to main AND semantic-release
# produced a new version). Conventional Commit prefix decides the bump:
#   feat: → minor    fix:/perf: → patch    feat!:/BREAKING CHANGE → major
#   chore:/docs:/refactor:/test:/style:/build:/ci: → no release
# See RELEASING.md for the full table.
on:
  push:
    branches: [main]
    paths:
      - 'ha-integration/addon/**'
      - 'ha-integration/custom_components/**'
      - 'services/**'
      - 'shared/lib-python/**'
      - 'adapters/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/addon-build.yml'
      - '.github/scripts/bump-version.cjs'
      - '.releaserc.json'
  pull_request:
    paths:
      - 'ha-integration/addon/**'
      - 'ha-integration/custom_components/**'
      - 'services/**'
      - 'shared/lib-python/**'
      - 'adapters/**'
      - '.github/workflows/addon-build.yml'
      - '.github/scripts/bump-version.cjs'
      - '.releaserc.json'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Validate add-on config.yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sanity-check YAML
        run: |
          python -c "import yaml, sys; yaml.safe_load(open('ha-integration/addon/kukiihome/config.yaml')); print('config.yaml OK')"
      - name: Compile-check the HA custom integration
        run: |
          # The custom_components integration is NOT in the uv workspace,
          # so the main CI never imports it — a syntax error there ships
          # silently (the SentiHome->Kukii-Home rename did exactly this,
          # corrupting class identifiers into `Kukii-HomeCoordinator`).
          # py_compile every module so an unimportable integration fails
          # the build instead of the user's HA install.
          python -m compileall -q ha-integration/custom_components/kukiihome/
          echo "HA custom integration compiles"
      - name: Check required add-on files exist
        run: |
          for f in config.yaml Dockerfile README.md DOCS.md CHANGELOG.md icon.png logo.png; do
            test -f "ha-integration/addon/kukiihome/$f" || { echo "MISSING: $f"; exit 1; }
          done
          # Epic 10.8.2: the Yellow add-on ships ONLY the ha-agent
          # service. The preprocessor (torch/onnxruntime/openvino) +
          # core/memory/notify/vlm-router run on a separate inference
          # box, not in this image. Check just what's actually here.
          for svc in ha-agent; do
            test -f "ha-integration/addon/kukiihome/rootfs/etc/services.d/$svc/run" || {
              echo "MISSING s6 service: $svc"; exit 1; }
          done
          echo "All required add-on files present"
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ha-integration/addon/kukiihome/Dockerfile
          failure-threshold: warning
          # DL3006/8/18 — see prior justification in commit history.
          ignore: DL3006,DL3008,DL3018

  # Static check of the s6 run scripts — arch-independent, so it runs
  # once here rather than per matrix leg.
  s6-scripts:
    name: Verify s6 run scripts point at the venv
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Verify s6 run scripts point at the venv
        run: |
          # Bare `python` in an s6 run script → crash-loop on import.
          # Catch the regression here.
          for f in ha-integration/addon/kukiihome/rootfs/etc/services.d/*/run; do
            if grep -q 'exec python' "$f"; then
              echo "FAIL: $f uses bare 'python'; should use /app/.venv/bin/python"
              exit 1
            fi
            if ! grep -q 'exec /app/.venv/bin/python' "$f"; then
              echo "FAIL: $f doesn't invoke /app/.venv/bin/python"
              exit 1
            fi
          done
          echo "All s6 run scripts correctly target the venv python"

  # ── semantic-release: decide if there's a release + bump version + tag ──
  #
  # Reads commits since the last v* tag, decides bump type from Conventional
  # Commits, writes the new version into config.yaml + manifest.json (via
  # .github/scripts/bump-version.cjs), prepends a CHANGELOG entry, commits
  # with `[skip ci]` so this workflow doesn't re-fire on its own commit, and
  # creates a GitHub Release + git tag.
  #
  # Only runs on push to main — never on PRs (we don't release from a PR;
  # the build + sanity-run on PR still runs to catch breakage).
  release:
    name: Determine next version
    runs-on: ubuntu-latest
    needs: s6-scripts
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      # @semantic-release/git pushes the bump commit; @semantic-release/github
      # creates the GitHub Release + git tag.
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_git_head: ${{ steps.semantic.outputs.new_release_git_head }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # semantic-release needs full history + tags
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/git@10
            @semantic-release/exec@6
            conventional-changelog-conventionalcommits@7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build the aarch64 image. Runs on PRs (load only, no push — sanity that
  # the Dockerfile builds) AND on push-to-main when a release was published
  # (push to GHCR using the bumped version). Skips on push-to-main commits
  # that didn't trigger a release (chore:/docs:/etc).
  #
  # amd64 dropped 2026-06-04: the only known user runs HA Yellow (aarch64);
  # amd64 was 1/2 of every CI cycle for no shipped consumer. Trivially
  # restorable by re-adding the matrix entry + the arch to config.yaml.
  build:
    name: Build add-on image (aarch64)
    runs-on: ubuntu-latest
    needs: [s6-scripts, release]
    if: |
      always() &&
      needs.s6-scripts.result == 'success' &&
      (
        github.event_name == 'pull_request' ||
        (github.event_name == 'push' && needs.release.outputs.new_release_published == 'true')
      )
    steps:
      - uses: actions/checkout@v4
        with:
          # On release: the bump commit semantic-release just pushed (carries
          # the new version in config.yaml). On PR: the trigger SHA.
          ref: ${{ needs.release.outputs.new_release_git_head || github.sha }}
      - name: Set up QEMU (cross-arch emulation for aarch64)
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Compute image ref + tags
        id: img
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          version=$(python -c "import yaml; print(yaml.safe_load(open('ha-integration/addon/kukiihome/config.yaml'))['version'])")
          image="ghcr.io/${owner}/aarch64-kukiihome-addon"
          {
            echo "image=${image}"
            echo "version=${version}"
            echo "tags=${image}:${version},${image}:latest"
            echo "ref=${image}:${version}"
          } >> "$GITHUB_OUTPUT"
          echo "Building aarch64 -> ${image}:${version}"
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (and push on release) the add-on image
        uses: docker/build-push-action@v6
        with:
          context: ha-integration/addon/kukiihome
          platforms: linux/arm64
          load: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.img.outputs.tags }}
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/aarch64-base-debian:bookworm
            KUKIIHOME_REF=${{ needs.release.outputs.new_release_git_head || github.sha }}
            CACHEBUST=${{ needs.release.outputs.new_release_git_head || github.sha }}

  # The "safe to update" gate. config.yaml's `image:` makes Supervisor pull
  # `ghcr.io/.../<arch>-kukiihome-addon:<version>` with NO local-build
  # fallback — if that tag isn't actually in GHCR, the update 404s. Re-pulls
  # the manifest for the version config.yaml currently declares, for every
  # arch listed in config.yaml's `arch:` field, AFTER build+push.
  #
  # Runs only when semantic-release published a new release.
  verify-published:
    name: Verify GHCR images match config.yaml version
    runs-on: ubuntu-latest
    needs: [release, build]
    if: github.event_name == 'push' && needs.release.outputs.new_release_published == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.new_release_git_head }}
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Manifest for config.yaml's version must exist for every arch
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          version=$(python -c "import yaml; print(yaml.safe_load(open('ha-integration/addon/kukiihome/config.yaml'))['version'])")
          arches=$(python -c "import yaml; print(' '.join(yaml.safe_load(open('ha-integration/addon/kukiihome/config.yaml'))['arch']))")
          echo "Verifying ${arches} images for version ${version} ..."
          fail=0
          for arch in $arches; do
            ref="ghcr.io/${owner}/${arch}-kukiihome-addon:${version}"
            if docker manifest inspect "$ref" >/dev/null 2>&1; then
              echo "  OK  $ref"
            else
              echo "  MISSING  $ref"
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            echo "::error::config.yaml declares image:/version that is not fully published to GHCR — a user update would 404."
            exit 1
          fi
          echo "All declared-arch images for ${version} are live in GHCR — safe to update."
