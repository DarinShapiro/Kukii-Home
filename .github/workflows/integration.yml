name: Integration tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  integration:
    name: Cross-service integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      nats:
        image: nats:2.11-alpine
        ports:
          - 4222:4222
        options: >-
          --health-cmd "wget -qO- http://localhost:8222/healthz || exit 0"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: sentihome
          POSTGRES_PASSWORD: sentihome
          POSTGRES_DB: sentihome_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sentihome"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports:
          - 6333:6333
        # No healthcheck — qdrant image doesn't ship wget/curl. Tests
        # responsible for waiting on readiness via the qdrant client.

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      NATS_URL: nats://localhost:4222
      DATABASE_URL: postgresql://sentihome:sentihome@localhost:5432/sentihome_test
      QDRANT_URL: http://localhost:6333
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.11.16'
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --all-packages --frozen

      - name: Run integration tests
        run: |
          if [[ -d "tests/integration" ]] && [[ -n "$(find tests/integration -name 'test_*.py' -type f 2>/dev/null)" ]]; then
            uv run pytest tests/integration -m integration -v
          else
            echo "::notice::No integration tests yet (will populate as epics ship)"
          fi
