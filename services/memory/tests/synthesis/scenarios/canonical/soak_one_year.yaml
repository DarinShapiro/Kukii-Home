name: soak_one_year
description: |
  365-day soak test. Verifies the long-tail decay-floor protection
  holds across a full calendar year of disuse — strict generalization
  of the 90-day rare_event scenario.

  Setup:
    Day 1: a max-weight (1.0) citation of actor_threat.
    Days 2-365: minimal ambient noise. No declared events, no further
                citations of actor_threat. The critical edge ages
                quietly.

  Mnemosyne's reverse-sigmoid decay has d=0.05 floor, so at any age
  the decay factor is ≥0.05. With stored weight 1.0, the actor's
  pruning score is ≥0.05 — strictly greater than the 0.04 threshold.
  By day 365 (much longer than the decay function's b=604_800s
  half-life), the floor IS the dominant term.

  Also exercises:
    * Runner correctness at large event counts (~3000 noise events
      over the year).
    * Neo4j write throughput at long simulated horizons.
    * Time provider monotonicity across 365 days of advance_to calls.

  Marked slow so PR CI skips it; nightly soak job runs it.

household: canonical
seed: 7
duration_days: 365
noise_profile: minimal

bootstrap:
  known_actors:
    - id: actor_threat
      name: Year-Old Threat
      role: visitor_unknown
      access_profile: none
    - id: actor_routine
      name: Routine Visitor
      role: visitor_unknown
      access_profile: none

events:
  # Day 1: the rare critical event. Maximum-weight citation, anchored
  # at 02:30 to be unambiguously "after midnight."
  - day: 1
    time: '02:30'
    camera: front_porch
    preprocessor_output:
      tag_set: [person]
      matched_actor_ids: [actor_threat]
    truth:
      actor_id: actor_threat
      intent: unauthorized_loitering
      should_fire_alert: true
      expected_tier: tier_2
      notes: |
        The signal event the system MUST preserve across 365 days
        of subsequent disuse.
    vlm_response:
      id: dec_d1_year_old_threat
      citations: [actor_threat]
      findings_summary: |
        Unknown person loitering at front porch at 02:30. No prior
        history. Tier_2 escalation. Maximum citation weight — must
        survive long-term memory decay.
      citation_weight: 1.0

assertions:
  # The whole point: at day 365, threshold 0.04 must NOT mark
  # actor_threat as prunable. Its weight (1.0) × decay floor (0.05)
  # = 0.05, above the threshold.
  - kind: pruning_candidate_exists
    node_kind: KnownActor
    threshold: 0.04
    must_include: actor_routine
    description: |
      Foil case: actor_routine has NO incident CITED edges so its
      pruning score is 0.0. It MUST be a candidate at any positive
      threshold. This proves the assertion machinery is firing.

  # Counts: 1 declared event + 365 days of noise events. We don't
  # assert an exact noise count (deterministic from seed, but
  # brittle to sampling changes) — just that noise actually fired
  # at scale.
  - kind: noise_events_at_least
    min_count: 100
    description: 'Year of minimal noise should produce hundreds of events.'

  - kind: vlm_invocation_count
    expected: 1
    description: |
      Only the day-1 critical event triggers VLM. All ambient noise
      events are recorded but not VLM-analyzed.
