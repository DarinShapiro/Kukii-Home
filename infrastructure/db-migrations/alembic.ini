; SentiHome SQL migrations — Alembic configuration.
;
; Apply with:
;   uv run alembic -c infrastructure/db-migrations/alembic.ini upgrade head
;
; Or via the dev helper:
;   ./scripts/dev/migrate.sh

[alembic]
script_location = infrastructure/db-migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = postgresql+asyncpg://sentihome:sentihome@localhost:5432/sentihome

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
